<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ArrowGrid Demo</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      #root { height: 100vh; display: flex; flex-direction: column; }
      .toolbar { padding: 10px; background: #f5f5f5; border-bottom: 1px solid #ddd; display: flex; gap: 10px; align-items: center; }
      .grid-container { flex: 1; padding: 16px 0 0 16px; }
      .grid-editor { height: 100%; }
      button { padding: 6px 12px; cursor: pointer; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="portal" style="position: fixed; left: 0; top: 0; z-index: 9999;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
